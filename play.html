<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私人影院 - 播放</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #e50914; --primary-dark: #b81d24; --bg-main: #141414; --bg-card: #1f1f1f; --bg-hover: #2a2a2a; --text-primary: #fff; --text-secondary: #a0a0a0; --text-muted: #666; --border: #333; --radius: 8px; --header-height: 50px; }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text-primary); }
        .app { display: flex; flex-direction: column; height: 100%; }
        .header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: rgba(20,20,20,0.98); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text-primary); text-decoration: none; font-size: 14px; padding: 8px; border-radius: var(--radius); }
        .back-btn:hover { background: var(--bg-hover); }
        .video-title { font-size: 14px; font-weight: 500; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .player-wrap { position: relative; background: #000; flex-shrink: 0; }
        video { width: 100%; display: block; background: #000; }
        .center-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); }
        .center-play:hover { background: rgba(0,0,0,0.9); }
        .center-play.hidden { display: none; }
        .controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 30px 12px 12px; opacity: 0; transition: opacity 0.3s; }
        .player-wrap:hover .controls, .player-wrap.show-controls .controls { opacity: 1; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; cursor: pointer; margin-bottom: 10px; }
        .progress-bar:hover { height: 6px; }
        .progress-filled { height: 100%; background: var(--primary); border-radius: 2px; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 10px; }
        .ctrl-btn { background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 4px; }
        .time { font-size: 12px; color: rgba(255,255,255,0.8); }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .loading-overlay.hidden { display: none; }
        .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .episode-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 50; }
        .source-row { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto; }
        .source-row::-webkit-scrollbar { display: none; }
        .source-item { flex-shrink: 0; padding: 6px 12px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; cursor: pointer; }
        .source-item.active { background: var(--primary); border-color: var(--primary); }
        .episode-row { padding: 10px 12px; overflow-x: auto; }
        .episode-row::-webkit-scrollbar { display: none; }
        .episode-scroll { display: flex; gap: 6px; }
        .ep-item { flex-shrink: 0; padding: 8px 14px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; }
        .ep-item.active { background: var(--primary); border-color: var(--primary); }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-card); color: var(--text-primary); padding: 12px 20px; border-radius: var(--radius); border: 1px solid var(--border); z-index: 200; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <a href="javascript:history.back()" class="back-btn"><span>←</span><span>返回</span></a>
            <div class="video-title" id="videoTitle">加载中...</div>
            <div style="width:50px"></div>
        </header>
        <div style="flex:1;display:flex;flex-direction:column">
            <div class="player-wrap" id="playerWrap">
                <video id="player" playsinline webkit-playsinline></video>
                <div class="center-play" id="centerPlay" onclick="togglePlay()">▶</div>
                <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><p>加载中...</p></div>
                <div class="controls" id="controls">
                    <div class="progress-bar" id="progressBar" onclick="seek(event)"><div class="progress-filled" id="progressFilled"></div></div>
                    <div class="controls-row">
                        <div class="controls-left">
                            <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶</button>
                            <button class="ctrl-btn" onclick="skip(-10)">⏪</button>
                            <button class="ctrl-btn" onclick="skip(10)">⏩</button>
                            <span class="time" id="timeDisplay">00:00 / 00:00</span>
                        </div>
                        <div class="controls-right">
                            <button class="ctrl-btn" id="volumeBtn" onclick="toggleMute()">🔊</button>
                            <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="episode-bar" id="episodeBar">
                <div class="source-row" id="sourceRow"></div>
                <div class="episode-row"><div class="episode-scroll" id="episodeScroll"></div></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <script>
        let sources = [], currentSource = null, videoData = null, playSources = [];
        let currentSrcIdx = 0, currentEpIdx = 0, hls = null, video = null;

        function init() {
            video = document.getElementById('player');
            loadSources();
            const params = new URLSearchParams(location.search);
            const id = params.get('id'), srcId = params.get('source');
            const si = parseInt(params.get('si')) || 0, ei = parseInt(params.get('ei')) || 0;
            if (!id) return showError('缺少视频ID');
            if (srcId) currentSource = sources.find(s => s.id === srcId);
            if (!currentSource && sources.length) currentSource = sources[0];
            if (!currentSource) return showError('请先添加数据源');
            currentSrcIdx = si; currentEpIdx = ei;
            loadDetail(id);
            setupEvents();
        }

        function loadSources() {
            const saved = localStorage.getItem('videoSources');
            if (saved) sources = JSON.parse(saved);
        }

        function normalizeUrl(base, action) {
            let url = base.trim().replace(/\/$/, '');
            url = url.replace(/[?&](ac|pg|t|wd|ids)=[^&]*/gi, '').replace(/\?&/, '?').replace(/[?&]$/, '');
            return url + (url.includes('?') ? '&' : '?') + 'ac=' + action;
        }

        async function proxyFetch(url, timeout = 25000) {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), timeout);
            try {
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(tid);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                try { return JSON.parse(text); }
                catch { throw new Error(text.includes('<!DOCTYPE') ? 'API地址错误' : '数据格式错误'); }
            } catch (e) { clearTimeout(tid); throw e.name === 'AbortError' ? new Error('请求超时') : e; }
        }

        async function loadDetail(id) {
            try {
                const data = await proxyFetch(normalizeUrl(currentSource.url, 'detail') + `&ids=${id}`);
                if (data.list?.length) {
                    videoData = data.list[0];
                    parseSources();
                    document.getElementById('videoTitle').textContent = videoData.vod_name;
                    renderUI();
                    if (playSources.length && playSources[currentSrcIdx]?.episodes[currentEpIdx]) playVideo(currentSrcIdx, currentEpIdx);
                } else showError('未找到视频');
            } catch (e) { showError('加载失败: ' + e.message); }
        }

        function parseSources() {
            playSources = [];
            if (!videoData.vod_play_url) return;
            const names = (videoData.vod_play_from || '').split('$$$');
            const urls = videoData.vod_play_url.split('$$$');
            for (let i = 0; i < urls.length; i++) {
                const eps = urls[i].split('#').filter(p => p.trim()).map(p => {
                    const [n, u] = p.split('$');
                    return { name: (n || '').trim() || '未知', url: (u || '').trim() };
                }).filter(e => e.url);
                const name = names[i] || `播放源${i + 1}`;
                const isM3u8 = name.toLowerCase().includes('m3u8') || eps.some(e => e.url.includes('.m3u8'));
                playSources.push({ name, episodes: eps, isM3u8 });
            }
            playSources.sort((a, b) => a.isM3u8 && !b.isM3u8 ? -1 : !a.isM3u8 && b.isM3u8 ? 1 : 0);
        }

        function renderUI() {
            const sourceRow = document.getElementById('sourceRow');
            if (!playSources.length) { sourceRow.innerHTML = ''; return; }
            sourceRow.innerHTML = playSources.map((s, i) => `<div class="source-item ${i === currentSrcIdx ? 'active' : ''}" onclick="selectSource(${i})">${s.name}</div>`).join('');
            renderEpisodes();
        }

        function renderEpisodes() {
            const src = playSources[currentSrcIdx];
            if (!src?.episodes.length) { document.getElementById('episodeScroll').innerHTML = ''; return; }
            document.getElementById('episodeScroll').innerHTML = src.episodes.map((e, i) => `<div class="ep-item ${i === currentEpIdx ? 'active' : ''}" onclick="selectEpisode(${i})">${e.name}</div>`).join('');
            setTimeout(() => { const a = document.querySelector('.ep-item.active'); if (a) a.scrollIntoView({ behavior: 'smooth', inline: 'center' }); }, 100);
        }

        function selectSource(idx) { currentSrcIdx = idx; currentEpIdx = 0; document.querySelectorAll('.source-item').forEach((t, i) => t.classList.toggle('active', i === idx)); renderEpisodes(); if (playSources[idx]?.episodes.length) playVideo(idx, 0); updateUrl(); }

        function selectEpisode(idx) { currentEpIdx = idx; renderEpisodes(); playVideo(currentSrcIdx, idx); updateUrl(); }

        function playVideo(srcIdx, epIdx) {
            const src = playSources[srcIdx];
            if (!src?.episodes[epIdx]) return;
            const url = src.episodes[epIdx].url;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('centerPlay').classList.add('hidden');
            if (hls) { hls.destroy(); hls = null; }
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => document.getElementById('centerPlay').classList.remove('hidden')));
                    hls.on(Hls.Events.ERROR, (e, d) => d.fatal && showToast('视频加载失败'));
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.play().catch(() => document.getElementById('centerPlay').classList.remove('hidden'));
                }
            } else { video.src = url; video.play().catch(() => document.getElementById('centerPlay').classList.remove('hidden')); }
        }

        function setupEvents() {
            video.addEventListener('loadedmetadata', () => document.getElementById('loadingOverlay').classList.add('hidden'));
            video.addEventListener('waiting', () => document.getElementById('loadingOverlay').classList.remove('hidden'));
            video.addEventListener('canplay', () => document.getElementById('loadingOverlay').classList.add('hidden'));
            video.addEventListener('play', () => { document.getElementById('centerPlay').classList.add('hidden'); document.getElementById('playBtn').textContent = '⏸'; });
            video.addEventListener('pause', () => { document.getElementById('centerPlay').classList.remove('hidden'); document.getElementById('playBtn').textContent = '▶'; });
            video.addEventListener('timeupdate', updateProgress);
            video.addEventListener('volumechange', updateVolumeUI);
            video.addEventListener('ended', () => { const src = playSources[currentSrcIdx]; if (src && currentEpIdx < src.episodes.length - 1) { showToast('即将播放下一集'); setTimeout(() => selectEpisode(currentEpIdx + 1), 2000); } });
            const wrap = document.getElementById('playerWrap');
            wrap.addEventListener('touchstart', showControls);
            document.addEventListener('keydown', handleKey);
        }

        function showControls() { const wrap = document.getElementById('playerWrap'); wrap.classList.add('show-controls'); clearTimeout(showControls.tid); showControls.tid = setTimeout(() => !video.paused && wrap.classList.remove('show-controls'), 3000); }
        function togglePlay() { video.paused ? video.play() : video.pause(); }
        function updateProgress() { const p = (video.currentTime / video.duration) * 100; document.getElementById('progressFilled').style.width = `${p}%`; document.getElementById('timeDisplay').textContent = `${fmtTime(video.currentTime)} / ${fmtTime(video.duration)}`; }
        function fmtTime(s) { if (!s || isNaN(s)) return '00:00'; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`; }
        function seek(e) { const rect = document.getElementById('progressBar').getBoundingClientRect(); video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration; }
        function skip(s) { video.currentTime += s; }
        function toggleMute() { video.muted = !video.muted; }
        function updateVolumeUI() { document.getElementById('volumeBtn').textContent = video.muted || video.volume === 0 ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊'; }
        function toggleFullscreen() { const wrap = document.getElementById('playerWrap'); if (!document.fullscreenElement) wrap.requestFullscreen?.() || wrap.webkitRequestFullscreen?.(); else document.exitFullscreen?.() || document.webkitExitFullscreen?.(); }
        function handleKey(e) { switch (e.key) { case ' ': case 'k': e.preventDefault(); togglePlay(); break; case 'ArrowLeft': e.preventDefault(); skip(-10); break; case 'ArrowRight': e.preventDefault(); skip(10); break; case 'f': e.preventDefault(); toggleFullscreen(); break; case 'm': e.preventDefault(); toggleMute(); break; case 'n': e.preventDefault(); if (playSources[currentSrcIdx] && currentEpIdx < playSources[currentSrcIdx].episodes.length - 1) selectEpisode(currentEpIdx + 1); break; case 'p': e.preventDefault(); if (currentEpIdx > 0) selectEpisode(currentEpIdx - 1); break; } }
        function updateUrl() { const params = new URLSearchParams(location.search); params.set('si', currentSrcIdx); params.set('ei', currentEpIdx); history.replaceState({}, '', '?' + params); }
        function showError(msg) { document.getElementById('playerWrap').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#fff;text-align:center;padding:20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;margin-bottom:8px">播放出错</div><div style="color:rgba(255,255,255,0.7)">${msg}</div></div>`; }
        function showToast(msg) { const t = document.querySelector('.toast'); if (t) t.remove(); const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 2500); }

        init();
    </script>
</body>
</html>
