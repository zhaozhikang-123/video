<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>私人影院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #e50914;
            --primary-dark: #b81d24;
            --bg-main: #141414;
            --bg-card: #1f1f1f;
            --bg-hover: #2a2a2a;
            --text-primary: #fff;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --border: #333;
            --radius: 8px;
            --radius-lg: 12px;
            --header-height: 56px;
            --bottom-height: 60px;
        }
        html, body { height: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.5; }

        .app { display: flex; flex-direction: column; height: 100%; }

        .header {
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-height);
            background: rgba(20,20,20,0.98); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); z-index: 100;
            display: flex; align-items: center; padding: 0 16px; gap: 12px;
        }
        .logo { display: flex; align-items: center; gap: 8px; color: var(--primary); font-size: 20px; font-weight: 700; text-decoration: none; flex-shrink: 0; }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; }
        .search-bar { flex: 1; display: flex; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 0 16px; height: 40px; max-width: 400px; }
        .search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text-primary); font-size: 14px; }
        .search-bar input::placeholder { color: var(--text-muted); }
        .search-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 4px; }
        .icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%; color: var(--text-primary); font-size: 18px; cursor: pointer; }

        .main-content { flex: 1; display: flex; margin-top: var(--header-height); overflow: hidden; }
        .sidebar { width: 200px; background: var(--bg-card); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
        .sidebar-header { padding: 16px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        .category-list { list-style: none; }
        .category-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; color: var(--text-secondary); }
        .category-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .category-item.active { background: var(--bg-hover); border-left-color: var(--primary); color: var(--primary); }
        .category-icon { font-size: 18px; width: 24px; text-align: center; }

        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .content-title { font-size: 20px; font-weight: 600; }
        .source-switch { display: flex; align-items: center; gap: 8px; }
        .source-switch label { font-size: 13px; color: var(--text-secondary); }
        .source-switch select { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; cursor: pointer; min-width: 140px; }

        .video-scroll { flex: 1; overflow-y: auto; padding: 16px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .video-card { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; }
        .video-card:hover { transform: translateY(-4px); border-color: var(--primary); }
        .video-poster { position: relative; aspect-ratio: 2/3; background: var(--bg-hover); overflow: hidden; }
        .video-poster img { width: 100%; height: 100%; object-fit: cover; }
        .video-poster .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text-muted); }
        .video-badge { position: absolute; top: 8px; right: 8px; background: var(--primary); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .video-info { padding: 12px; }
        .video-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .video-meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .video-type { background: rgba(229,9,20,0.15); color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }
        .page-btn { padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 14px; cursor: pointer; }
        .page-btn:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-btn.active { background: var(--primary); border-color: var(--primary); }
        .page-info { font-size: 13px; color: var(--text-secondary); }

        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-height); background: rgba(20,20,20,0.98); backdrop-filter: blur(10px); border-top: 1px solid var(--border); z-index: 100; }
        .bottom-nav-inner { display: flex; height: 100%; }
        .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text-secondary); text-decoration: none; font-size: 10px; cursor: pointer; }
        .bottom-nav-item.active { color: var(--primary); }
        .bottom-nav-item span:first-child { font-size: 20px; }

        .mobile-category-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; }
        .mobile-category-modal.active { display: flex; align-items: flex-end; }
        .mobile-category-panel { width: 100%; max-height: 70vh; background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .mobile-category-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .mobile-category-header h3 { font-size: 16px; }
        .mobile-category-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-hover); border-radius: 50%; font-size: 18px; cursor: pointer; }
        .mobile-category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 16px; max-height: calc(70vh - 60px); overflow-y: auto; }
        .mobile-category-item { padding: 12px 8px; background: var(--bg-hover); border-radius: var(--radius); text-align: center; font-size: 13px; cursor: pointer; }
        .mobile-category-item.active { background: var(--primary); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: var(--radius-lg); width: 100%; max-width: 480px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-hover); border-radius: 50%; font-size: 20px; cursor: pointer; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary); }
        .form-group input { width: 100%; padding: 12px; background: var(--bg-main); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-primary); font-size: 14px; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn { padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--bg-hover); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-sm { padding: 8px 12px; font-size: 12px; }
        .source-list { margin-top: 20px; }
        .source-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-main); border-radius: var(--radius); margin-bottom: 8px; border: 1px solid var(--border); }
        .source-item.active { border-color: var(--primary); }
        .source-info h4 { font-size: 14px; margin-bottom: 4px; }
        .source-info p { font-size: 11px; color: var(--text-muted); word-break: break-all; }
        .source-actions { display: flex; gap: 6px; }

        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; color: var(--text-secondary); }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-size: 18px; margin-bottom: 8px; color: var(--text-primary); }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-card); color: var(--text-primary); padding: 12px 24px; border-radius: var(--radius); border: 1px solid var(--border); z-index: 400; animation: fadeInUp 0.3s ease; }
        .toast.error { border-color: #dc3545; }
        .toast.success { border-color: #28a745; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        @media (max-width: 1024px) { .sidebar { width: 180px; } .video-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; } }
        @media (max-width: 768px) {
            :root { --header-height: 52px; --bottom-height: 56px; }
            .header { padding: 0 12px; }
            .logo span { display: none; }
            .search-bar { height: 36px; }
            .sidebar { display: none; }
            .content { margin-bottom: var(--bottom-height); }
            .bottom-nav { display: block; }
            .content-header { padding: 12px 16px; }
            .content-title { font-size: 18px; }
            .video-scroll { padding: 12px; }
            .video-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .video-card { border-radius: var(--radius); }
            .video-info { padding: 8px; }
            .video-title { font-size: 12px; margin-bottom: 4px; }
            .video-meta { font-size: 10px; }
            .video-badge { font-size: 9px; padding: 1px 5px; max-width: 60px; }
            .pagination { padding: 12px; gap: 6px; }
            .page-btn { padding: 8px 12px; font-size: 12px; }
            .mobile-category-grid { grid-template-columns: repeat(4, 1fr); }
            .modal { max-height: 90vh; margin: 10px; }
        }
        @media (max-width: 480px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .video-info { padding: 6px; }
            .video-title { font-size: 11px; }
            .video-type { font-size: 9px; }
            .mobile-category-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 769px) { .bottom-nav { display: none !important; } .mobile-category-modal { display: none !important; } }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <a href="index.html" class="logo"><div class="logo-icon">▶</div><span>私人影院</span></a>
            <div class="search-bar"><input type="text" id="searchInput" placeholder="搜索影视..." onkeypress="handleSearch(event)"><button class="search-btn" onclick="doSearch()">🔍</button></div>
            <div class="header-actions"><button class="icon-btn" onclick="openSettings()">⚙️</button></div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-header">分类</div>
                <ul class="category-list" id="categoryList"><li class="category-item active" onclick="selectCategory('all', this)"><span class="category-icon">🎬</span><span>全部</span></li></ul>
            </aside>
            <main class="content">
                <div class="content-header">
                    <h1 class="content-title" id="contentTitle">全部</h1>
                    <div class="source-switch"><label>线路:</label><select id="sourceSelect" onchange="changeSource()"></select></div>
                </div>
                <div class="video-scroll">
                    <div class="video-grid" id="videoGrid"><div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div></div>
                    <div class="pagination" id="pagination" style="display:none;"></div>
                </div>
            </main>
        </div>

        <nav class="bottom-nav">
            <div class="bottom-nav-inner">
                <div class="bottom-nav-item active" onclick="goHome()"><span>🏠</span><span>首页</span></div>
                <div class="bottom-nav-item" onclick="openMobileCategory()"><span>📂</span><span>分类</span></div>
                <div class="bottom-nav-item" onclick="openSettings()"><span>⚙️</span><span>设置</span></div>
            </div>
        </nav>

        <div class="mobile-category-modal" id="mobileCategoryModal" onclick="closeMobileCategory(event)">
            <div class="mobile-category-panel" onclick="event.stopPropagation()">
                <div class="mobile-category-header"><h3>选择分类</h3><div class="mobile-category-close" onclick="closeMobileCategory()">✕</div></div>
                <div class="mobile-category-grid" id="mobileCategoryGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header"><h2 class="modal-title">数据源设置</h2><div class="modal-close" onclick="closeSettings()">✕</div></div>
            <div class="modal-body">
                <div class="form-group"><label>数据源名称</label><input type="text" id="sourceName" placeholder="例如: 线路3"></div>
                <div class="form-group"><label>API地址</label><input type="text" id="sourceUrl" placeholder="https://example.com/api.php/provide/vod/"></div>
                <button class="btn btn-primary" onclick="addSource()">添加数据源</button>
                <div class="source-list" id="sourceList"></div>
            </div>
        </div>
    </div>

    <script>
        let sources = [], currentSource = null, categories = [], currentCategory = 'all';
        let currentPage = 1, totalPages = 1, totalItems = 0, searchKeyword = '', posterCache = {};

        const DEFAULT_SOURCES = [
            { id: 'default_fast', name: '线路1-快速稳定', url: 'https://bdzy1.com/api.php/provide/vod/', active: true },
            { id: 'default_rich', name: '线路2-资源丰富', url: 'https://api.apibdzy.com/api.php/provide/vod/', active: false }
        ];

        function init() {
            loadSources();
            renderSourceList();
            updateSourceSelect();
            if (sources.length > 0) {
                currentSource = sources.find(s => s.active) || sources[0];
                if (currentSource) { loadCategories(); loadVideos(); }
            } else { showEmpty(); }
        }

        function loadSources() {
            const saved = localStorage.getItem('videoSources');
            if (saved) sources = JSON.parse(saved);
            if (sources.length === 0) { sources = JSON.parse(JSON.stringify(DEFAULT_SOURCES)); saveSources(); }
        }

        function saveSources() { localStorage.setItem('videoSources', JSON.stringify(sources)); }

        function renderSourceList() {
            const list = document.getElementById('sourceList');
            if (sources.length === 0) { list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">暂无数据源</p>'; return; }
            list.innerHTML = sources.map(s => `
                <div class="source-item ${currentSource?.id === s.id ? 'active' : ''}">
                    <div class="source-info"><h4>${s.name}</h4><p>${s.url}</p></div>
                    <div class="source-actions">
                        <button class="btn btn-sm btn-secondary" onclick="selectSource('${s.id}')">选用</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSource('${s.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateSourceSelect() {
            const select = document.getElementById('sourceSelect');
            select.innerHTML = sources.length === 0 ? '<option value="">请添加数据源</option>' : sources.map(s => `<option value="${s.id}" ${currentSource?.id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
        }

        function addSource() {
            const name = document.getElementById('sourceName').value.trim();
            const url = document.getElementById('sourceUrl').value.trim();
            if (!name || !url) return showToast('请填写完整信息', 'error');
            sources.push({ id: Date.now().toString(), name, url, active: false });
            saveSources();
            document.getElementById('sourceName').value = '';
            document.getElementById('sourceUrl').value = '';
            renderSourceList();
            updateSourceSelect();
            showToast('添加成功', 'success');
        }

        function deleteSource(id) {
            sources = sources.filter(s => s.id !== id);
            if (currentSource?.id === id) { currentSource = sources[0] || null; if (currentSource) currentSource.active = true; }
            saveSources();
            renderSourceList();
            updateSourceSelect();
            if (currentSource) { loadCategories(); loadVideos(); } else showEmpty();
            showToast('已删除', 'success');
        }

        function selectSource(id) {
            sources.forEach(s => s.active = s.id === id);
            currentSource = sources.find(s => s.id === id);
            saveSources();
            renderSourceList();
            updateSourceSelect();
            currentPage = 1; currentCategory = 'all';
            loadCategories(); loadVideos();
        }

        function changeSource() { const id = document.getElementById('sourceSelect').value; if (id) selectSource(id); }

        function normalizeUrl(base, action) {
            let url = base.trim().replace(/\/$/, '');
            url = url.replace(/[?&](ac|pg|t|wd|ids)=[^&]*/gi, '').replace(/\?&/, '?').replace(/[?&]$/, '');
            return url + (url.includes('?') ? '&' : '?') + 'ac=' + action;
        }

        const PROXY_URL = 'https://withered-resonance-0d9d.952485896.workers.dev';

        async function fetchData(url, timeout = 20000) {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), timeout);
            try {
                const res = await fetch(`${PROXY_URL}/?url=${encodeURIComponent(url)}`, { signal: ctrl.signal });
                clearTimeout(tid);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                try { return JSON.parse(text); }
                catch { throw new Error(text.includes('<!DOCTYPE') ? 'API地址错误' : '数据格式错误'); }
            } catch (e) { clearTimeout(tid); throw e.name === 'AbortError' ? new Error('请求超时') : e; }
        }

        async function loadCategories() {
            if (!currentSource) return;
            try {
                const data = await fetchData(normalizeUrl(currentSource.url, 'list'));
                if (data.class?.length) { categories = data.class; renderCategories(); }
            } catch (e) { console.error('分类加载失败:', e); }
        }

        function renderCategories() {
            const html = `<li class="category-item ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategory('all', this)"><span class="category-icon">🎬</span><span>全部</span></li>` +
                categories.map(c => `<li class="category-item ${currentCategory === c.type_id ? 'active' : ''}" onclick="selectCategory(${c.type_id}, this)"><span class="category-icon">📁</span><span>${c.type_name}</span></li>`).join('');
            document.getElementById('categoryList').innerHTML = html;
            const mobileHtml = `<div class="mobile-category-item ${currentCategory === 'all' ? 'active' : ''}" onclick="selectCategoryMobile('all')">全部</div>` +
                categories.map(c => `<div class="mobile-category-item ${currentCategory === c.type_id ? 'active' : ''}" onclick="selectCategoryMobile(${c.type_id})">${c.type_name}</div>`).join('');
            document.getElementById('mobileCategoryGrid').innerHTML = mobileHtml;
        }

        function selectCategory(id, el) {
            document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            currentCategory = id; currentPage = 1; searchKeyword = '';
            document.getElementById('contentTitle').textContent = id === 'all' ? '全部' : categories.find(c => c.type_id === id)?.type_name || '影视';
            loadVideos();
        }

        function selectCategoryMobile(id) { selectCategory(id); closeMobileCategory(); }

        async function loadVideos() {
            if (!currentSource) return showEmpty();
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>加载中...</p></div>';
            try {
                let url = normalizeUrl(currentSource.url, 'list') + `&pg=${currentPage}`;
                if (currentCategory !== 'all') url += `&t=${currentCategory}`;
                if (searchKeyword) url += `&wd=${encodeURIComponent(searchKeyword)}`;
                const data = await fetchData(url);
                if (data.code === 1 && data.list?.length) {
                    currentPage = data.page || currentPage;
                    totalPages = data.pagecount || 1;
                    totalItems = data.total || 0;
                    renderVideos(data.list);
                    renderPagination();
                } else { showEmpty('没有找到影视'); }
            } catch (e) {
                console.error('加载失败:', e);
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">加载失败</div><p>${e.message}</p><p style="font-size:12px;margin-top:8px;color:var(--text-muted)">请尝试切换线路或检查网络</p><button class="btn btn-primary" style="margin-top:16px" onclick="openSettings()">设置数据源</button></div>`;
            }
        }

        function renderVideos(list) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = list.map(v => `
                <div class="video-card" onclick="goDetail(${v.vod_id})">
                    <div class="video-poster" id="poster-${v.vod_id}">
                        ${posterCache[v.vod_id] ? `<img src="${posterCache[v.vod_id]}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>🎬</div>'">` : '<div class="placeholder">🎬</div>'}
                        ${v.vod_remarks ? `<span class="video-badge">${v.vod_remarks}</span>` : ''}
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.vod_name}</div>
                        <div class="video-meta"><span class="video-type">${v.type_name || '影视'}</span><span>${v.vod_time?.split(' ')[0] || ''}</span></div>
                    </div>
                </div>
            `).join('');
            list.forEach(v => !posterCache[v.vod_id] && loadPoster(v.vod_id));
        }

        async function loadPoster(id) {
            if (!currentSource) return;
            try {
                const data = await fetchData(normalizeUrl(currentSource.url, 'detail') + `&ids=${id}`);
                if (data.list?.[0]?.vod_pic) {
                    posterCache[id] = data.list[0].vod_pic;
                    const el = document.getElementById(`poster-${id}`);
                    if (el) el.innerHTML = `<img src="${posterCache[id]}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>🎬</div>'">${data.list[0].vod_remarks ? `<span class="video-badge">${data.list[0].vod_remarks}</span>` : ''}`;
                }
            } catch (e) {}
        }

        function renderPagination() {
            const el = document.getElementById('pagination');
            el.style.display = 'flex';
            let html = `<button class="page-btn" onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
            html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            const start = Math.max(1, currentPage - 2), end = Math.min(totalPages, currentPage + 2);
            for (let i = start; i <= end; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            html += `<span class="page-info">${currentPage}/${totalPages}</span>`;
            el.innerHTML = html;
        }

        function goPage(p) { if (p < 1 || p > totalPages) return; currentPage = p; loadVideos(); document.querySelector('.video-scroll')?.scrollTo({ top: 0, behavior: 'smooth' }); }
        function goDetail(id) { window.location.href = `detail.html?id=${id}&source=${currentSource?.id || ''}`; }
        function handleSearch(e) { if (e.key === 'Enter') doSearch(); }
        function doSearch() { searchKeyword = document.getElementById('searchInput').value.trim(); currentPage = 1; document.getElementById('contentTitle').textContent = searchKeyword ? `搜索: ${searchKeyword}` : '全部'; loadVideos(); }
        function showEmpty(msg = '请添加数据源') { document.getElementById('videoGrid').innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-title">${msg}</div><p>点击右上角设置添加数据源</p></div>`; document.getElementById('pagination').style.display = 'none'; }
        function openSettings() { document.getElementById('settingsModal').classList.add('active'); renderSourceList(); }
        function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
        function openMobileCategory() { document.getElementById('mobileCategoryModal').classList.add('active'); }
        function closeMobileCategory(e) { if (!e || e.target === e.currentTarget) document.getElementById('mobileCategoryModal').classList.remove('active'); }
        function goHome() { currentCategory = 'all'; currentPage = 1; searchKeyword = ''; document.getElementById('searchInput').value = ''; document.getElementById('contentTitle').textContent = '全部'; loadCategories(); loadVideos(); }
        function showToast(msg, type = 'info') { const existing = document.querySelector('.toast'); if (existing) existing.remove(); const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

        document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });
        init();
    </script>
</body>
</html>
